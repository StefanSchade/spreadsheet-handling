io:
  profiles:
    pack_json_to_xlsx:
      input:  { kind: json_dir, path: scripts/spreadsheet_handling/examples/roundtrip_start_json }
      output: { kind: xlsx,     path: scripts/spreadsheet_handling/tmp/world_out.xlsx }

    unpack_xlsx_to_json:
      input:  { kind: xlsx,     path: scripts/spreadsheet_handling/tmp/world.xlsx }
      output: { kind: json_dir, path: scripts/spreadsheet_handling/tmp/json_out }

pipelines:
  basic:
    - step: validate
      mode_duplicate_ids: warn
      mode_missing_fk: warn
      defaults:
        id_field: id
        label_field: name
        detect_fk: true
        helper_prefix: "_"

    # FK-helper primitives consume the v2 relation policy. Run
    # `infer_fk_relations` (heuristic) or `configure_fk_helpers` (manual)
    # before `add_fk_helpers` / `remove_fk_helpers` / `reorder_fk_helpers`
    # / `validate_fk_helpers`.
    - step: infer_fk_relations
      mode: naming_convention
      id_columns: [id]
      fk_patterns:
        - "id_({target})"
      target_label_fields: [name]

    - step: add_fk_helpers

    - step: remove_fk_helpers
      prefix: "_"
