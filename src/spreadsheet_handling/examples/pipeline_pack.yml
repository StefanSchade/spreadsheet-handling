# Example: JSON dir -> XLSX with basic validation + FK helpers + drop helpers
io:
  input:
    kind: json_dir
    path: scripts/spreadsheet_handling/examples/roundtrip_start_json  # adjust to your real example dir
  output:
    kind: xlsx
    path: scripts/spreadsheet_handling/tmp/world_out.xlsx

pipeline:
  - step: validate
    mode_duplicate_ids: warn
    mode_missing_fk: warn
    defaults:
      id_field: id
      label_field: name
      detect_fk: true
      helper_prefix: "_"

  # FK-helper primitives consume the v2 relation policy written by
  # `infer_fk_relations` (heuristic) or `configure_fk_helpers` (manual).
  - step: infer_fk_relations
    mode: naming_convention
    id_columns: [id]
    fk_patterns:
      - "id_({target})"
    target_label_fields: [name]

  - step: add_fk_helpers

  - step: remove_fk_helpers
    prefix: "_"
