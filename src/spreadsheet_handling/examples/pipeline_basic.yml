io:
  profiles:
    pack_json_to_xlsx:
      pipeline: basic           # binds default pipeline for this profile
      input:  { kind: json_dir, path: scripts/.../roundtrip_start_json }
      output: { kind: xlsx,     path: scripts/.../tmp/world_out.xlsx }

pipelines:
  basic:
    - step: validate
      mode_duplicate_ids: warn
      mode_missing_fk: warn
      defaults: { id_field: id, label_field: name, detect_fk: true, helper_prefix: "_" }
    # FK-helper primitives consume policy; `infer_fk_relations` writes the
    # v2 relation policy from the `id_(<target>)` cell convention.
    - step: infer_fk_relations
      mode: naming_convention
      id_columns: [id]
      fk_patterns:
        - "id_({target})"
      target_label_fields: [name]
    - step: add_fk_helpers
    - step: remove_fk_helpers
      prefix: "_"
