io:
  input:
    kind: json_dir
    path: ./project_memory/canonical
  output:
    kind: json_dir
    path: ./project_memory/derived

pipeline:
  - step: plugin
    dotted: project_memory.plugins.queries:current_findings
    args:
      source: findings

  - step: plugin
    dotted: project_memory.plugins.queries:ftr_dependency_edges
    args:
      source: ftr_dependencies

  - step: plugin
    dotted: project_memory.plugins.queries:ftr_blockers
    args:
      ftrs: ftrs
      ftr_dependencies: ftr_dependencies

  - step: plugin
    dotted: project_memory.plugins.queries:release_note_candidates
    args:
      signals: concern_events
      xrefs: concern_event_xrefs

  - step: plugin
    dotted: project_memory.plugins.queries:event_ftr_links
    args:
      events: concern_events
      xrefs: concern_event_xrefs
      ftrs: ftrs

  - step: plugin
    dotted: project_memory.plugins.queries:finding_assessment_heatmap
    args:
      findings_source: findings
      mappings_source: assessment_scale_mappings

  - step: plugin
    dotted: project_memory.plugins.queries:derived_views_only
