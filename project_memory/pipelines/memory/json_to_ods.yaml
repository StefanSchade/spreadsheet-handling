io:
  input:
    kind: json_dir
    path: ./project_memory/canonical
  output:
    kind: ods
    path: ./project_memory.ods

pipeline:
  - step: contract_xref
    relation: concern_signal_xrefs
    output: concern_signal_matrix
    row_keys:
      - signal_id
    column_key: concern_thread_id
    column_keys:
      - CONC-DOMAIN-META-SEMANTICS
      - CONC-ADAPTER-SPREADSHEET-BOUNDARY
      - CONC-USER-SURFACE-ADOPTION
      - CONC-PROJECTION-ERGONOMICS
      - CONC-BACKEND-PORTABILITY
      - CONC-MAINTAINABILITY-HYGIENE
      - CONC-PROJECT-MEMORY-GOVERNANCE
    value: signal_role
    fill_value: ""
  - step: plugin
    dotted: project_memory.plugins.queries:enrich_concern_signal_matrix
    args:
      matrix: concern_signal_matrix
      signals: concern_signals
