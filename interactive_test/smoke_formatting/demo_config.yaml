# Demo: Phase 2+3 Features (Style Themes, YAML Overrides, Validations)
#
# Zeigt:
#   - bootstrap_meta:     setzt workbook-weite Defaults (auto_filter, helper_prefix)
#   - apply_overrides:    laedt per-sheet Config aus overrides.yaml (Farben, freeze)
#   - add_validations:    Dropdown-Validierung auf status/priority Spalten
#
# Das XLSX wird ueber den IR-Pfad gerendert (SH_XLSX_BACKEND=ir)

io:
  input:
    kind: json_dir
    path: ./interactive_test/smoke_formatting/in
  output:
    kind: xlsx
    path: ./tmp/smoke_formatting.xlsx

pipeline:
  - step: bootstrap_meta
    profile_defaults:
      auto_filter: true
      freeze_header: false
      helper_prefix: "_"

  - step: apply_overrides
    overrides_path: ./interactive_test/smoke_formatting/overrides.yaml

  - step: add_validations
    rules:
      - sheet: Products
        column: status
        rule:
          type: in_list
          values: [Active, Discontinued, Pending]
      - sheet: Products
        column: category
        rule:
          type: in_list
          values: [Electronics, Clothing, Books, Other]
      - sheet: Orders
        column: priority
        rule:
          type: in_list
          values: [Low, Medium, High, Urgent]
