registry_version: 2
purpose: >
  Manual registry of spreadsheet-relevant metadata entries across the current
  write and parse paths. This is a review artifact, not a runtime contract.
maintenance_contract:
  maintenance_mode: manual_review_artifact
  runtime_binding: forbidden
  common_required_fields:
    - name
    - layer
    - classification
    - meaning
    - scope
    - origin
    - render_relevance
    - persistence_behavior
    - roundtrip_relevance
    - producer
    - consumer
  allowed_layers:
    - meta_canonical
    - meta_rendering
  layer_notes:
    meta_canonical: Persisted or caller-supplied spreadsheet-neutral workbook semantics.
    meta_rendering: Derived or carrier-near metadata attached to WorkbookIR or SheetIR.
  allowed_classifications:
    - canonical_meta
    - derived_operational_view
    - carrier_artifact
    - read_path_hint
  classification_notes:
    canonical_meta: Canonical spreadsheet-neutral meaning that may be persisted and overridden.
    derived_operational_view: Derived IR-local working view for passes, planning, or projection.
    carrier_artifact: Backend-near persistence or control artifact that is not a second canonical source.
    read_path_hint: Parser-derived carrier-side hint that aids reconstruction or diagnostics without becoming canonical policy.
reference_conventions:
  code_reference_prefix: spreadsheet_handling
  code_reference_style: dotted module or symbol path relative to spreadsheet_handling
  approved_narrative_references:
    - callers supplying canonical workbook meta
    - future FK-helper configuration and validation steps
    - plugins producing resolved helper policy
    - plugins producing resolved lifecycle policy
    - future readback/conflict diagnostics
    - future configure_frame_lifecycle step
    - tests and diagnostics
entries:
  - name: version
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level version marker carried as persisted metadata.
    scope: workbook
    origin: persisted input meta, bootstrap profile defaults, or runtime overrides
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: reconstructible workbook metadata
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.meta_pass.MetaPass
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames
    precedence_notes: CLI/runtime overrides win over persisted meta, which wins over profile defaults.

  - name: author
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level author marker carried as persisted metadata.
    scope: workbook
    origin: persisted input meta or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: reconstructible workbook metadata
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.meta_pass.MetaPass
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames

  - name: exported_at
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level export timestamp carried as persisted metadata.
    scope: workbook
    origin: persisted input meta or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: reconstructible workbook metadata
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.meta_pass.MetaPass
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames

  - name: sheets
    layer: meta_canonical
    classification: canonical_meta
    meaning: Namespace for sheet-local workbook metadata overrides keyed by visible sheet name.
    scope: workbook namespace with sheet-local children
    origin: YAML overrides, runtime overrides, or persisted workbook meta
    render_relevance: indirect
    persistence_behavior: persisted as part of the canonical workbook metadata payload
    roundtrip_relevance: reconstructible workbook metadata and source of sheet option restoration
    producer:
      - domain.yaml_overrides.apply_overrides
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    merge_behavior: Deep-merged by key when overrides are applied.
    precedence_notes: Sheet-local children override workbook defaults of the same directive during compose.

  - name: column_widths
    layer: meta_canonical
    classification: canonical_meta
    meaning: Sheet-local mapping of spreadsheet column letters to explicitly authored display widths.
    scope: sheet-local child under `sheets[<sheet>]`
    origin: parsed spreadsheet carrier dimensions, persisted input meta, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted as part of the canonical workbook metadata payload under the owning sheet
    roundtrip_relevance: preserves user-authored column display widths across parse/write/parse cycles
    producer:
      - io_backends.xlsx.openpyxl_parser._extract_column_widths
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser._extract_ods_column_widths
      - io_backends.ods.odf_parser.parse_workbook
      - callers supplying canonical workbook meta
    consumer:
      - rendering.passes.column_width_pass.ColumnWidthPass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_renderer.render_workbook
      - io_backends.ods.odf_renderer.render_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Sheet-local width maps are keyed by spreadsheet column letter; later values replace prior values for the same column.
    precedence_notes: Width metadata records presentation state only; it must not alter table shape or cell semantics.

  - name: text_orientations
    layer: meta_canonical
    classification: canonical_meta
    meaning: Sheet-local mapping of cell addresses to explicitly authored text rotation angles.
    scope: sheet-local child under `sheets[<sheet>]`
    origin: parsed spreadsheet carrier cell alignment, persisted input meta, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted as part of the canonical workbook metadata payload under the owning sheet
    roundtrip_relevance: preserves user-authored header cell text rotation across parse/write/parse cycles
    producer:
      - io_backends.xlsx.openpyxl_parser._extract_text_orientations
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser._extract_ods_text_orientations
      - io_backends.ods.odf_parser.parse_workbook
      - callers supplying canonical workbook meta
    consumer:
      - rendering.passes.text_orientation_pass.TextOrientationPass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_renderer.render_workbook
      - io_backends.ods.odf_renderer.render_workbook
    merge_behavior: Sheet-local orientation maps are keyed by cell address; later values replace prior values for the same cell.
    precedence_notes: >-
      Rotation metadata records presentation state only; it must not alter table shape or cell semantics.
      XLSX textRotation convention: 0=horizontal, 1-90=CCW, 91-180=CW (stored as 90+CW_angle).
      ODS stores CCW 0-360. Conversion is applied on both read and write paths.

  - name: horizontal_alignments
    layer: meta_canonical
    classification: canonical_meta
    meaning: Sheet-local mapping of cell addresses to explicitly authored horizontal text alignment.
    scope: sheet-local child under `sheets[<sheet>]`
    origin: parsed spreadsheet carrier cell alignment, persisted input meta, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted as part of the canonical workbook metadata payload under the owning sheet
    roundtrip_relevance: preserves user-authored horizontal cell text alignment across parse/write/parse cycles
    producer:
      - io_backends.xlsx.openpyxl_parser._extract_horizontal_alignments
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser._extract_ods_horizontal_alignments
      - io_backends.ods.odf_parser.parse_workbook
      - callers supplying canonical workbook meta
    consumer:
      - rendering.passes.horizontal_alignment_pass.HorizontalAlignmentPass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_renderer.render_workbook
      - io_backends.ods.odf_renderer.render_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Sheet-local horizontal-alignment maps are keyed by cell address; later values replace prior values for the same cell.
    precedence_notes: >-
      Horizontal-alignment metadata records presentation state only; it must not alter table shape or cell semantics.
      Canonical vocabulary is XLSX-shaped and restricted to `left`, `center`, `right` in this slice;
      other openpyxl values (`general`, `fill`, `justify`, `distributed`, `centerContinuous`) are
      dropped on read and not emitted on write.
      ODS write uses absolute `fo:text-align` values (`left`, `center`, `right`) on
      `style:paragraph-properties`; ODS read accepts both absolute and locale-neutral
      (`start`, `end`) forms and normalizes to the canonical absolute encoding.

  - name: vertical_alignments
    layer: meta_canonical
    classification: canonical_meta
    meaning: Sheet-local mapping of cell addresses to explicitly authored vertical text alignment.
    scope: sheet-local child under `sheets[<sheet>]`
    origin: parsed spreadsheet carrier cell alignment, persisted input meta, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted as part of the canonical workbook metadata payload under the owning sheet
    roundtrip_relevance: preserves user-authored vertical cell text alignment across parse/write/parse cycles
    producer:
      - io_backends.xlsx.openpyxl_parser._extract_vertical_alignments
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser._extract_ods_vertical_alignments
      - io_backends.ods.odf_parser.parse_workbook
      - callers supplying canonical workbook meta
    consumer:
      - rendering.passes.vertical_alignment_pass.VerticalAlignmentPass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_renderer.render_workbook
      - io_backends.ods.odf_renderer.render_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Sheet-local vertical-alignment maps are keyed by cell address; later values replace prior values for the same cell.
    precedence_notes: >-
      Vertical-alignment metadata records presentation state only; it must not alter table shape or cell semantics.
      Canonical vocabulary is XLSX-shaped and restricted to `top`, `center`, `bottom` in this slice;
      other openpyxl values (`justify`, `distributed`) are dropped on read and not emitted on write.
      ODS write emits `style:vertical-align` on `style:table-cell-properties` with values
      `top` / `middle` / `bottom`; ODS read normalizes `middle` to the canonical `center`
      and drops `automatic` (and any other unmapped value) as a "no value" sentinel.

  - name: freeze_header
    layer: meta_canonical
    classification: canonical_meta
    meaning: Request a frozen pane below the header area for a sheet.
    scope: workbook default and sheet override
    origin: profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and also materialized as derived freeze metadata in the IR
    roundtrip_relevance: canonical intent should survive; read path also reconstructs a carrier-side freeze hint
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.freeze_pass.FreezePass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].freeze_header` overrides workbook-level `freeze_header`.

  - name: auto_filter
    layer: meta_canonical
    classification: canonical_meta
    meaning: Request an autofilter over the table header and data region.
    scope: workbook default and sheet override
    origin: profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and materialized as derived autofilter metadata in the IR
    roundtrip_relevance: canonical intent should survive; read path also reconstructs a carrier-side autofilter reference
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.filter_pass.FilterPass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].auto_filter` overrides workbook-level `auto_filter`.

  - name: header_fill_rgb
    layer: meta_canonical
    classification: canonical_meta
    meaning: Header fill color directive for table header cells.
    scope: workbook default and sheet override
    origin: profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and materialized as derived header style metadata in the IR
    roundtrip_relevance: canonical intent should survive; current read path restores only the sheet option hint, not a full style model
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.style_pass.StylePass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].header_fill_rgb` overrides workbook-level `header_fill_rgb`.

  - name: helper_fill_rgb
    layer: meta_canonical
    classification: canonical_meta
    meaning: Fill color directive for helper columns resolved from explicit helper-column metadata, helper provenance, or helper-prefix detection.
    scope: workbook default and sheet override
    origin: persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and materialized as derived helper-column style metadata in the IR
    roundtrip_relevance: canonical intent should survive; current read path does not reconstruct helper-column styling semantics
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.style_pass.StylePass
      - rendering.flow.build_render_plan
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].helper_fill_rgb` overrides workbook-level `helper_fill_rgb`.

  - name: helper_prefix
    layer: meta_canonical
    classification: canonical_meta
    meaning: Prefix that identifies helper columns and influences helper-column styling and naming behaviour.
    scope: workbook default and sheet override
    origin: pipeline profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: indirect
    persistence_behavior: persisted canonically and copied into per-sheet options for downstream passes
    roundtrip_relevance: canonical intent should survive; read path restores the option hint from embedded meta
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.style_pass.StylePass
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
      - domain.transformations.helpers.reorder_helpers_next_to_fk
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].helper_prefix` overrides workbook-level `helper_prefix`.

  - name: helper_columns
    layer: meta_canonical
    classification: canonical_meta
    meaning: Sheet-local explicit list of helper/display columns to style independent of technical helper-name prefixes.
    scope: sheet-local child under `sheets[<sheet>]`
    origin: declarative workbook view configuration, persisted input meta, YAML sheet overrides, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted as part of the canonical workbook metadata payload under the owning sheet
    roundtrip_relevance: canonical intent should survive; read paths restore the option hint from embedded meta
    producer:
      - domain.workbook_views.configure_workbook_view
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.style_pass.StylePass
      - io_backends.xlsx.parser_interpretation.build_sheet_meta_hints
      - io_backends.ods.parser_interpretation.build_sheet_meta_hints
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Sheet-local list values replace prior values for the same sheet.
    precedence_notes: Explicit helper_columns add style targets; helper_prefix remains a compatibility/default detection path.

  - name: protection
    layer: meta_canonical
    classification: canonical_meta
    meaning: Sheet-level protection configuration declaring which columns are editable and optional password protection.
    scope: sheet-local child under `sheets[<sheet>]`
    origin: declarative workbook view configuration via `editable_columns` or explicit `protection` mapping
    render_relevance: direct
    persistence_behavior: persisted as part of the canonical workbook metadata payload under the owning sheet
    roundtrip_relevance: canonical intent should survive; read paths restore the option hint from embedded meta
    producer:
      - domain.workbook_views.configure_workbook_view
    consumer:
      - rendering.passes.protection_pass.ProtectionPass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_renderer
      - io_backends.ods.odf_renderer
    merge_behavior: Sheet-local mapping values replace prior values for the same sheet.
    precedence_notes: Per-sheet `protection.editable_columns` takes precedence over `protection.editable` derivation mode.

  - name: helper_policies
    layer: meta_canonical
    classification: canonical_meta
    meaning: >-
      Resolved helper policy metadata for lookup-helper and FK-helper steps.
      The `lookup` namespace is keyed by lookup frame. The `fk` namespace
      uses v2 relation entries under `fk.schema_version` plus
      `fk.relations` keyed by `(source_frame, source_column)`. v2 is the
      single, durable runtime contract for FK-helper primitives. As of FK
      Helper Slice 2 (v1 retirement) the legacy v1 per-target dict keyed by
      FK target is no longer written by `configure_fk_helpers`; v2 relations
      it produces are durable and survive the persistence boundary like
      inferred or hand-authored relations. A v1 dict found in an older
      persisted sidecar is inert (no runtime reader).
    scope: workbook mapping with `lookup` and `fk` policy namespaces keyed by lookup frame or FK target
    origin: configuration steps, persisted input meta, plugins, or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves resolved helper allowlists, defaults, join keys, ordering, and missing-value policy for later helper execution or validation
    producer:
      - domain.helper_policies.configure_lookup_helpers
      - domain.helper_policies.configure_fk_helpers
      - domain.fk_relations.infer_fk_relations
      - callers supplying canonical workbook meta
      - plugins producing resolved helper policy
    consumer:
      - domain.transformations.enrich_lookup.enrich_lookup
      - domain.transformations.fk_helpers.enrich_helpers
      - domain.transformations.fk_helpers.drop_helpers
      - domain.transformations.helpers.reorder_helpers_next_to_fk
      - domain.validations.fk_helpers.validate_fk_helpers
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: >-
      Lookup policy entries are keyed by lookup frame and replace the prior
      entry of the same key. v2 FK relation entries under `fk.relations`
      are keyed by `(source_frame, source_column)`; cross-producer
      collisions on the same key fail clearly; same-producer rewrites are
      accepted only when the relation body is semantically identical and
      otherwise fail clearly (no silent overwrites). As of FK Helper Slice 2
      `configure_fk_helpers` writes only the v2 relation model and no longer
      emits any residual v1 per-target dict.
    precedence_notes: >-
      Configuration steps must persist concrete resolved policy; primitive
      helper steps must not treat unresolved `auto` as execution semantics.
      FK-helper primitives consume only the v2 relation policy under
      `helper_policies.fk` (plus derived helper provenance under
      `_meta.derived.sheets.*.helper_columns`). Convention-driven primitive
      inference is no longer supported and is asserted by the FK-helper
      primitives architecture guard.
    contract_lifecycle:
      scope: fk
      notes: >-
        Lifecycle fields apply only to the `fk` namespace under this entry.
        The `lookup` namespace is single-shape and does not opt in.
        Vocabulary definition lives in
        `docs/technical_model/ch05_registries/registry_semantics/05_contract_lifecycle.adoc`.
        Pilot established by
        `FTR-REGISTRY-CONTRACT-LIFECYCLE-MODEL-P5`. After
        `FTR-FK-HELPERS-POLICY-DRIVEN-PRIMITIVES-P5` the runtime consumers
        read v2 only. FK Helper Slice 2 (v1 retirement) then removed the v1
        producer write, so the entry is now single-shape v2 and the
        v1 -> v2 transition bridge is retired.
      current_state:
        shapes:
          v1_per_target_policy: >-
            Retired. Per-target dicts under
            `_meta.helper_policies.fk.<target_key>`. No longer written by
            any producer after FK Helper Slice 2 (v1 retirement) and never
            read by any runtime consumer after
            `FTR-FK-HELPERS-POLICY-DRIVEN-PRIMITIVES-P5`. Retained here only
            as the documented source shape of the retired transition bridge;
            a v1 dict in an older sidecar is inert.
          v2_relation_policy: >-
            Relation list under `_meta.helper_policies.fk.relations`
            keyed by `(source_frame, source_column)`, plus the
            `_meta.helper_policies.fk.schema_version` marker. Written by
            `configure_fk_helpers` (via deterministic frame-scan identity
            derivation) and by `infer_fk_relations`; durable across the
            persistence boundary. Authoritatively consumed by the FK-helper
            primitives.
        runtime_writes:
          - v2_relation_policy
        runtime_reads:
          - v2_relation_policy
        producers:
          - domain.helper_policies.configure_fk_helpers
          - domain.fk_relations.infer_fk_relations
        consumers:
          - domain.transformations.fk_helpers.enrich_helpers
          - domain.transformations.fk_helpers.drop_helpers
          - domain.transformations.helpers.reorder_helpers_next_to_fk
          - domain.validations.fk_helpers.validate_fk_helpers
      target_state:
        preferred_shape: v2_relation_policy
        owning_ftr: FTR-FK-HELPERS-POLICY-DRIVEN-PRIMITIVES-P5
        target_consumers:
          - domain.transformations.fk_helpers.enrich_helpers
          - domain.transformations.fk_helpers.drop_helpers
          - domain.transformations.helpers.reorder_helpers_next_to_fk
          - domain.validations.fk_helpers.validate_fk_helpers
      transition_bridge:
        status: retired
        bridge_type: dual_write
        source_shape: v1_per_target_policy
        target_shape: v2_relation_policy
        reason: >-
          Retired by FK Helper Slice 2 (v1 retirement). The dual_write bridge
          existed while `configure_fk_helpers` emitted both the v1 per-target
          shape and the v2 relation list. Runtime consumers already read v2
          only; Slice 2 removed the v1 producer write, so the entry is now
          single-shape v2 and the bridge is no longer needed.
        bridge_rule: >-
          While active, `configure_fk_helpers` wrote both the v1 per-target
          shape and the v2 relation list. After retirement it writes the v2
          relation list only, deriving relation identity by a deterministic
          frame-scan over current data frames for the configured literal
          `fk_column` header. `infer_fk_relations` writes v2 only. Runtime
          consumers read v2 exclusively.
        identity_derivation: temporary_bridge
        identity_derivation_notes: >-
          `configure_fk_helpers` derives v2 relation identity
          `(source_frame, source_column)` by scanning current data frames for
          the configured literal `fk_column` header. This deterministic
          identity derivation survives bridge retirement (it is how the v2
          relation is built); it is authorized by
          `FTR-INFER-FK-RELATIONS-CONFIGURATION-STEP-P5` and must not be
          generalized into primitive heuristic inference, which belongs to
          `infer_fk_relations`.
        removal_ftr: FTR-FK-HELPERS-POLICY-DRIVEN-PRIMITIVES-P5
        removal_condition: >-
          Met by FK Helper Slice 2: `configure_fk_helpers` no longer writes
          the residual v1 per-target shape, so the entry is single-shape v2
          and the bridge is retired. See
          `audit/fk_helper_slice2_v1_retirement_review.adoc`.

  - name: frame_lifecycle
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level mapping that classifies frame roles, editability, render visibility, derivation, supersession, and consistency policy for the current transformation context.
    scope: workbook mapping keyed by frame name
    origin: lifecycle-aware transformation steps, plugins, persisted input meta, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged when present
    roundtrip_relevance: records canonical/source/projection relationships needed for editable views, diagnostics, and future readback conflict handling
    producer:
      - domain.frame_lifecycle.write_frame_lifecycle
      - domain.transformations.compact_multiaxis.expand_compact_multiaxis
      - domain.transformations.compact_multiaxis.contract_compact_multiaxis
      - domain.transformations.enrich_lookup.enrich_lookup
      - domain.transformations.join_views.join_frames
      - domain.transformations.tabular_views.pivot_frame
      - domain.workbook_views.configure_workbook_view
      - domain.extractions.frame_extract.extract_frame
      - plugins producing resolved lifecycle policy
      - callers supplying canonical workbook meta
    consumer:
      - rendering.frame_selection.select_render_frames
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
      - future readback/conflict diagnostics
    merge_behavior: Entries are keyed by frame name; lifecycle-aware steps update the entry for frames they create or explicitly supersede.
    precedence_notes: Rendering may use this metadata for visibility, but pipeline execution must not branch or skip steps from it.

  - name: workbook_view
    layer: meta_canonical
    classification: canonical_meta
    meaning: Explicit workbook rendering policy that selects how lifecycle-classified frames are exposed in the generated workbook.
    scope: workbook
    origin: caller-supplied canonical workbook meta, persisted input meta, plugins, or future view-configuration steps
    render_relevance: direct
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged when present
    roundtrip_relevance: records the intended editable/debug/full view policy used to materialize visible sheets
    producer:
      - callers supplying canonical workbook meta
      - plugins producing resolved lifecycle policy
      - domain.workbook_views.configure_workbook_view
      - future configure_frame_lifecycle step
    consumer:
      - rendering.frame_selection.select_render_frames
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Treated as a workbook-level policy object; later explicit policy replaces earlier policy.
    precedence_notes: Absence of `workbook_view` preserves current render visibility behavior.

  - name: workbook_view.sheet_mappings
    layer: meta_canonical
    classification: canonical_meta
    meaning: Persisted reverse mapping from visible workbook sheet names to logical workbook-view frames, with an optional explicit canonical target when lifecycle metadata identifies one.
    scope: workbook_view child list keyed by visible sheet identity
    origin: declarative workbook view configuration or persisted input meta
    render_relevance: direct
    persistence_behavior: persisted inside `_meta.workbook_view` in the hidden workbook metadata payload unchanged
    roundtrip_relevance: allows workbook readback to resolve renamed or reordered visible sheets back to logical view frames without heuristics
    producer:
      - domain.workbook_views.configure_workbook_view
      - callers supplying canonical workbook meta
    consumer:
      - domain.workbook_views.resolve_workbook_view_sheet_mappings
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Mapping entries are authored as an ordered list; later explicit workbook_view policy replaces the entire list.
    precedence_notes: Readback must treat this mapping as authoritative and must not reconstruct it from sheet labels, order, or columns.

  - name: constraints
    layer: meta_canonical
    classification: canonical_meta
    meaning: Structured workbook-level validation rules that describe spreadsheet-neutral constraint intent.
    scope: workbook list with sheet-targeted members
    origin: validation domain helpers, persisted input meta, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted in the hidden workbook metadata payload and copied into hidden IR metadata unchanged
    roundtrip_relevance: authoritative roundtrip-carrying source for validation intent
    producer:
      - domain.validations.validate_columns.add_validations
      - pipeline.steps.make_add_validations_step
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.passes.validation_pass.ValidationPass
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: List values replace rather than deep-merge when a later source writes `constraints`.
    precedence_notes: Constraint interpretation belongs to the IR/rendering layer, not the backend adapter.

  - name: legend_blocks
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level codebook definitions for compact spreadsheet codes rendered as visible legend blocks.
    scope: workbook list or mapping with sheet-targeted members
    origin: persisted input meta or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted in the hidden workbook metadata payload, including resolved legend placement after compose
    roundtrip_relevance: authoritative source for visible legend/codebook blocks and later codec validation references
    producer:
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser.parse_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Mapping entries are interpreted by legend block name; merge policy is intentionally deferred to callers.
    precedence_notes: Legend/codebook meaning remains canonical metadata; visible legend tables are rendered projections.

  - name: xref_crosstable
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for matrix/long-form XRef transformation configuration, resolved axis order, and optional dense-axis reconstruction contract.
    scope: workbook mapping keyed by transform id or relation frame name
    origin: domain XRef transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves row-key names, matrix column key order, and resolved dense-axis identities for matrix/relation roundtrips
    producer:
      - domain.transformations.xref_crosstable.expand_xref
      - domain.transformations.xref_crosstable.contract_xref
      - callers supplying canonical workbook meta
    consumer:
      - domain.transformations.xref_crosstable.contract_xref
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Transform entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: XRef metadata records structural transformation intent and axis mapping; cell value semantics remain outside this key.

  - name: split_by_discriminator
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for split/merge-by-discriminator transformation configuration, generated frame mapping, and optional row-order restoration.
    scope: workbook mapping keyed by transform id or source/target frame name
    origin: domain split-by-discriminator transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves discriminator-to-frame mapping, original column order, and optional source row positions for strict split/merge roundtrips
    producer:
      - domain.transformations.discriminator_split.split_by_discriminator
      - domain.transformations.discriminator_split.merge_by_discriminator
      - callers supplying canonical workbook meta
    consumer:
      - domain.transformations.discriminator_split.merge_by_discriminator
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Transform entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: Split metadata records structural table projection only; domain meaning of discriminator values remains outside this key.

  - name: sparse_defaults
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for sparse default-value collapse/expand configuration on editable crosstable frames.
    scope: workbook mapping keyed by transform id or frame name
    origin: domain sparse-default transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves target columns, default value, blank placeholder, and conflict policy for sparse/dense crosstable roundtrips
    producer:
      - domain.transformations.sparse_defaults.sparse_collapse
      - domain.transformations.sparse_defaults.sparse_expand
      - callers supplying canonical workbook meta
    consumer:
      - domain.transformations.sparse_defaults.sparse_expand
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Transform entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: Sparse-default metadata records generic default/blank cell semantics only; domain meaning of the default value remains outside this key.

  - name: cell_codecs
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for compact cell value parsing, validation, and serialization configuration.
    scope: workbook mapping keyed by codec/transform id or output frame name
    origin: domain cell-codec transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves configured codec mode, delimiter, allowed-value references, and canonical token order for decode/encode roundtrips
    producer:
      - domain.transformations.cell_codec.decode_cell_values
      - domain.transformations.cell_codec.encode_cell_values
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Codec entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: Cell codec metadata records generic code/token handling only; domain interpretation remains outside this key.

  - name: compact_multiaxis
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for composed compact matrix, XRef, and cell-codec transformation configuration.
    scope: workbook mapping keyed by transform id or relation frame name
    origin: domain compact-multiaxis transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves composed transform mode, row/column key names, codec configuration, sparse behavior, and optional group projection
    producer:
      - domain.transformations.compact_multiaxis.expand_compact_multiaxis
      - domain.transformations.compact_multiaxis.contract_compact_multiaxis
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Transform entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: Compact multiaxis metadata records generic composition only; dense axis reconstruction remains a future explicit contract and must not be inferred.

  - name: workbook_meta_blob
    layer: meta_rendering
    classification: carrier_artifact
    meaning: Hidden-sheet carrier entry that stores the persisted workbook metadata payload for the current XLSX path.
    scope: hidden workbook sheet
    origin: derived from canonical workbook meta during compose/pass execution
    render_relevance: indirect
    persistence_behavior: written to the hidden `_meta` sheet as deterministic JSON in the concrete persistence carrier
    roundtrip_relevance: current authoritative read-back carrier for canonical workbook metadata
    producer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.apply_all
      - rendering.passes.meta_pass.MetaPass
    consumer:
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames
    precedence_notes: This is a carrier artifact for the current backend path, not a second canonical source.

  - name: options
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Merged per-sheet operational view of workbook and sheet directives used by rendering passes.
    scope: sheet
    origin: derived from canonical workbook defaults plus `sheets[<name>]` overrides
    render_relevance: direct
    persistence_behavior: not persisted as its own carrier; reconstructed from canonical metadata on read
    roundtrip_relevance: derived operational view, useful but not authoritative
    producer:
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    consumer:
      - rendering.passes.style_pass.StylePass
      - rendering.passes.filter_pass.FilterPass
      - rendering.passes.freeze_pass.FreezePass
    scope_inheritance: Starts from workbook-level defaults and is then overridden by sheet-local values.
    merge_behavior: Workbook option dict is copied, then updated with the sheet-local option dict.
    precedence_notes: Downstream passes should consume `options` instead of re-merging workbook meta themselves.

  - name: __style
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived sheet-local style directives prepared for `RenderPlan` style ops.
    scope: sheet
    origin: derived from `options` during IR passes
    render_relevance: direct
    persistence_behavior: transient IR-only metadata
    roundtrip_relevance: not authoritative; recomputed from canonical metadata when available
    producer:
      - rendering.passes.style_pass.StylePass
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Derived write-path detail, not a user-facing canonical key.

  - name: __helper_cols
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived helper-column styling targets resolved from explicit helper-column metadata, helper provenance, and helper-prefix detection.
    scope: sheet
    origin: derived from `options`, workbook helper provenance, and table headers during IR passes
    render_relevance: direct
    persistence_behavior: transient IR-only metadata
    roundtrip_relevance: not authoritative
    producer:
      - rendering.passes.style_pass.StylePass
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Derived write-path detail, not a user-facing canonical key.

  - name: __autofilter
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived autofilter area for later `SetAutoFilter` plan emission.
    scope: sheet
    origin: derived from `options` and table geometry during IR passes
    render_relevance: direct
    persistence_behavior: transient IR-only metadata
    roundtrip_relevance: not authoritative
    producer:
      - rendering.passes.filter_pass.FilterPass
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Derived write-path detail, not a user-facing canonical key.

  - name: __freeze
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived freeze-pane target for later `SetFreeze` plan emission.
    scope: sheet
    origin: derived from `options` and table geometry during IR passes, or reconstructed from an existing workbook on read
    render_relevance: direct
    persistence_behavior: transient on write; reconstructed on read from the carrier workbook
    roundtrip_relevance: useful implementation hint, but canonical intent still belongs to `freeze_header`
    producer:
      - rendering.passes.freeze_pass.FreezePass
      - io_backends.xlsx.openpyxl_parser._extract_freeze
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Carrier-side reconstruction should not be treated as a replacement for canonical policy.

  - name: __autofilter_ref
    layer: meta_rendering
    classification: read_path_hint
    meaning: Read-path reconstruction of the concrete autofilter reference found in an existing workbook.
    scope: sheet
    origin: parsed from workbook carrier state
    render_relevance: indirect
    persistence_behavior: read-path only helper; not emitted by the current write path
    roundtrip_relevance: diagnostic/read-back hint rather than canonical intent
    producer:
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    consumer:
      - tests and diagnostics
    precedence_notes: This is a carrier-side hint and should not outrank canonical `auto_filter`.

  - name: __legend_blocks
    layer: meta_rendering
    classification: read_path_hint
    meaning: Read-path hints identifying parsed visible table blocks that originated from canonical legend block metadata.
    scope: sheet
    origin: reconstructed from persisted `legend_blocks[*].resolved` metadata during parse
    render_relevance: indirect
    persistence_behavior: read-path only helper; not emitted by the current write path as a separate key
    roundtrip_relevance: prevents visible legend/codebook tables from being mistaken for primary data tables
    producer:
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser.parse_workbook
    consumer:
      - tests and diagnostics
    precedence_notes: This is a carrier-side hint for IR reconstruction; canonical codebook content belongs to `legend_blocks`.

  - name: _hidden
    layer: meta_rendering
    classification: carrier_artifact
    meaning: Marker that a `SheetIR` belongs to the hidden workbook metadata carrier set.
    scope: hidden sheet
    origin: assigned when hidden sheets are created or parsed
    render_relevance: indirect
    persistence_behavior: used to decide hidden-sheet plan emission; excluded from the persisted key/value payload itself
    roundtrip_relevance: necessary to preserve hidden-sheet status in IR
    producer:
      - rendering.passes.meta_pass.MetaPass
      - io_backends.xlsx.openpyxl_parser._parse_hidden_sheet
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Internal carrier control flag, not part of canonical workbook metadata.

  - name: derived
    layer: meta_rendering
    classification: derived_operational_view
    lifecycle: transient
    meaning: >-
      Transient workbook-level namespace for current-run helper-column provenance
      used by rendering passes, helper-cleanup steps, FK-helper layout and
      validation primitives. Not FK-only: both FK-helper provenance and
      lookup-helper provenance share this namespace under distinct sub-keys
      that are independent of each other. FK-helper provenance entries under
      `derived.sheets.*.helper_columns` carry `{column, fk_column, target,
      target_key, value_field}`; `target_key` was added by
      `FTR-FK-HELPERS-POLICY-DRIVEN-PRIMITIVES-P5` so consumers do not
      re-derive the target's primary-key column.
    scope: >-
      Workbook namespace with sheet-local children under `derived.sheets[<sheet>]`.
      Current known sub-keys: `derived.sheets.*.helper_columns` (written by
      fk_helpers._write_helper_provenance, entries `{column, fk_column,
      target, target_key, value_field}`) and `derived.sheets.*.enrich_lookup`
      (written by enrich_lookup._write_provenance). Consumers must treat each
      sub-key independently; the namespace is not owned by any single producer.
    origin: helper enrichment steps that materialize FK or lookup helper columns for the current pipeline run
    render_relevance: direct
    persistence_behavior: >-
      transient IR/workbook-meta working payload; never persisted to workbook
      output as canonical metadata. Consumed and removed by `drop_helpers`;
      also removed by `apply_derived_column_policy` for the source frame it
      replaces (it strips the `helper_columns` and `enrich_lookup` provenance
      it consumed when dropping those columns)
    roundtrip_relevance: not authoritative; helper provenance is recomputed by helper-enrichment steps when needed
    producer:
      - domain.transformations.enrich_lookup._write_provenance
      - domain.transformations.fk_helpers._write_helper_provenance
    consumer:
      - rendering.passes._base._derived_helper_column_names
      - domain.transformations.fk_helpers.drop_helpers
      - domain.transformations.helpers.reorder_helpers_next_to_fk
      - domain.validations.fk_helpers.validate_fk_helpers
      - domain.transformations.derived_column_policy.apply_derived_column_policy
    merge_behavior: >-
      Sheet-local entries are keyed by source frame name; each producer updates
      only its own sub-key within the sheet entry and must not overwrite another
      producer's sub-key.
    precedence_notes: >-
      Sub-key data is provenance metadata only — not canonical and not authoritative
      over workbook structure. Pipeline execution must not infer routing or
      rendering policy from sub-key names, shapes, or values.
