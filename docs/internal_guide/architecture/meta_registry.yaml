registry_version: 2
purpose: >
  Manual registry of spreadsheet-relevant metadata entries across the current
  write and parse paths. This is a review artifact, not a runtime contract.
maintenance_contract:
  maintenance_mode: manual_review_artifact
  runtime_binding: forbidden
  common_required_fields:
    - name
    - layer
    - classification
    - meaning
    - scope
    - origin
    - render_relevance
    - persistence_behavior
    - roundtrip_relevance
    - producer
    - consumer
  allowed_layers:
    - meta_canonical
    - meta_rendering
  layer_notes:
    meta_canonical: Persisted or caller-supplied spreadsheet-neutral workbook semantics.
    meta_rendering: Derived or carrier-near metadata attached to WorkbookIR or SheetIR.
  allowed_classifications:
    - canonical_meta
    - derived_operational_view
    - carrier_artifact
    - read_path_hint
  classification_notes:
    canonical_meta: Canonical spreadsheet-neutral meaning that may be persisted and overridden.
    derived_operational_view: Derived IR-local working view for passes, planning, or projection.
    carrier_artifact: Backend-near persistence or control artifact that is not a second canonical source.
    read_path_hint: Parser-derived carrier-side hint that aids reconstruction or diagnostics without becoming canonical policy.
reference_conventions:
  code_reference_prefix: spreadsheet_handling
  code_reference_style: dotted module or symbol path relative to spreadsheet_handling
  approved_narrative_references:
    - callers supplying canonical workbook meta
    - tests and diagnostics
entries:
  - name: version
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level version marker carried as persisted metadata.
    scope: workbook
    origin: persisted input meta, bootstrap profile defaults, or runtime overrides
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: reconstructible workbook metadata
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.MetaPass
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames
    precedence_notes: CLI/runtime overrides win over persisted meta, which wins over profile defaults.

  - name: author
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level author marker carried as persisted metadata.
    scope: workbook
    origin: persisted input meta or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: reconstructible workbook metadata
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.MetaPass
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames

  - name: exported_at
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level export timestamp carried as persisted metadata.
    scope: workbook
    origin: persisted input meta or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: reconstructible workbook metadata
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.MetaPass
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames

  - name: sheets
    layer: meta_canonical
    classification: canonical_meta
    meaning: Namespace for sheet-local workbook metadata overrides keyed by visible sheet name.
    scope: workbook namespace with sheet-local children
    origin: YAML overrides, runtime overrides, or persisted workbook meta
    render_relevance: indirect
    persistence_behavior: persisted as part of the canonical workbook metadata payload
    roundtrip_relevance: reconstructible workbook metadata and source of sheet option restoration
    producer:
      - domain.yaml_overrides.apply_overrides
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    merge_behavior: Deep-merged by key when overrides are applied.
    precedence_notes: Sheet-local children override workbook defaults of the same directive during compose.

  - name: freeze_header
    layer: meta_canonical
    classification: canonical_meta
    meaning: Request a frozen pane below the header area for a sheet.
    scope: workbook default and sheet override
    origin: profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and also materialized as derived freeze metadata in the IR
    roundtrip_relevance: canonical intent should survive; read path also reconstructs a carrier-side freeze hint
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.FreezePass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].freeze_header` overrides workbook-level `freeze_header`.

  - name: auto_filter
    layer: meta_canonical
    classification: canonical_meta
    meaning: Request an autofilter over the table header and data region.
    scope: workbook default and sheet override
    origin: profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and materialized as derived autofilter metadata in the IR
    roundtrip_relevance: canonical intent should survive; read path also reconstructs a carrier-side autofilter reference
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.FilterPass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].auto_filter` overrides workbook-level `auto_filter`.

  - name: header_fill_rgb
    layer: meta_canonical
    classification: canonical_meta
    meaning: Header fill color directive for table header cells.
    scope: workbook default and sheet override
    origin: profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and materialized as derived header style metadata in the IR
    roundtrip_relevance: canonical intent should survive; current read path restores only the sheet option hint, not a full style model
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.StylePass
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].header_fill_rgb` overrides workbook-level `header_fill_rgb`.

  - name: helper_fill_rgb
    layer: meta_canonical
    classification: canonical_meta
    meaning: Fill color directive for helper columns derived from helper-prefix detection.
    scope: workbook default and sheet override
    origin: persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: direct
    persistence_behavior: persisted canonically and materialized as derived helper-column style metadata in the IR
    roundtrip_relevance: canonical intent should survive; current read path does not reconstruct helper-column styling semantics
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.StylePass
      - rendering.flow.build_render_plan
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].helper_fill_rgb` overrides workbook-level `helper_fill_rgb`.

  - name: helper_prefix
    layer: meta_canonical
    classification: canonical_meta
    meaning: Prefix that identifies helper columns and influences helper-column styling and naming behaviour.
    scope: workbook default and sheet override
    origin: pipeline profile defaults, persisted workbook meta, YAML sheet overrides, or runtime overrides
    render_relevance: indirect
    persistence_behavior: persisted canonically and copied into per-sheet options for downstream passes
    roundtrip_relevance: canonical intent should survive; read path restores the option hint from embedded meta
    producer:
      - domain.meta_bootstrap.bootstrap_meta
      - domain.yaml_overrides.apply_overrides
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.core.StylePass
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
      - domain.transformations.helpers.reorder_helpers_next_to_fk
    scope_inheritance: Workbook default is copied into per-sheet options before sheet-specific overrides are applied.
    merge_behavior: Last-writer-wins scalar within the workbook/sheet option merge.
    precedence_notes: Per-sheet `sheets[<name>].helper_prefix` overrides workbook-level `helper_prefix`.

  - name: helper_policies
    layer: meta_canonical
    classification: canonical_meta
    meaning: Resolved helper policy metadata for lookup-helper and FK-helper primitive steps.
    scope: workbook mapping with `lookup` and `fk` policy namespaces keyed by lookup frame or FK target
    origin: configuration steps, persisted input meta, plugins, or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves resolved helper allowlists, defaults, join keys, ordering, and missing-value policy for later helper execution or validation
    producer:
      - domain.helper_policies.configure_lookup_helpers
      - callers supplying canonical workbook meta
      - plugins producing resolved helper policy
    consumer:
      - domain.transformations.enrich_lookup.enrich_lookup
      - future FK-helper configuration and validation steps
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Policy entries are keyed by namespace and target; a later policy replaces the prior entry of the same key.
    precedence_notes: Configuration steps must persist concrete resolved policy; primitive helper steps must not treat unresolved `auto` as execution semantics.

  - name: constraints
    layer: meta_canonical
    classification: canonical_meta
    meaning: Structured workbook-level validation rules that describe spreadsheet-neutral constraint intent.
    scope: workbook list with sheet-targeted members
    origin: validation domain helpers, persisted input meta, or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted in the hidden workbook metadata payload and copied into hidden IR metadata unchanged
    roundtrip_relevance: authoritative roundtrip-carrying source for validation intent
    producer:
      - domain.validations.validate_columns.add_validations
      - pipeline.steps.make_add_validations_step
      - domain.meta_bootstrap.bootstrap_meta
      - callers supplying canonical workbook meta
    consumer:
      - rendering.passes.validation_pass.apply
      - rendering.passes.core.ValidationPass
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: List values replace rather than deep-merge when a later source writes `constraints`.
    precedence_notes: Constraint interpretation belongs to the IR/rendering layer, not the backend adapter.

  - name: legend_blocks
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level codebook definitions for compact spreadsheet codes rendered as visible legend blocks.
    scope: workbook list or mapping with sheet-targeted members
    origin: persisted input meta or caller-supplied canonical workbook meta
    render_relevance: direct
    persistence_behavior: persisted in the hidden workbook metadata payload, including resolved legend placement after compose
    roundtrip_relevance: authoritative source for visible legend/codebook blocks and later codec validation references
    producer:
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser.parse_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Mapping entries are interpreted by legend block name; merge policy is intentionally deferred to callers.
    precedence_notes: Legend/codebook meaning remains canonical metadata; visible legend tables are rendered projections.

  - name: xref_crosstable
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for matrix/long-form XRef transformation configuration and resolved axis column order.
    scope: workbook mapping keyed by transform id or relation frame name
    origin: domain XRef transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves row-key names and matrix column key order for matrix/relation roundtrips
    producer:
      - domain.transformations.xref_crosstable.expand_xref
      - domain.transformations.xref_crosstable.contract_xref
      - callers supplying canonical workbook meta
    consumer:
      - domain.transformations.xref_crosstable.contract_xref
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Transform entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: XRef metadata records structural transformation intent and axis mapping; cell value semantics remain outside this key.

  - name: cell_codecs
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for compact cell value parsing, validation, and serialization configuration.
    scope: workbook mapping keyed by codec/transform id or output frame name
    origin: domain cell-codec transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves configured codec mode, delimiter, allowed-value references, and canonical token order for decode/encode roundtrips
    producer:
      - domain.transformations.cell_codec.decode_cell_values
      - domain.transformations.cell_codec.encode_cell_values
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Codec entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: Cell codec metadata records generic code/token handling only; domain interpretation remains outside this key.

  - name: compact_multiaxis
    layer: meta_canonical
    classification: canonical_meta
    meaning: Workbook-level metadata for composed compact matrix, XRef, and cell-codec transformation configuration.
    scope: workbook mapping keyed by transform id or relation frame name
    origin: domain compact-multiaxis transformations or caller-supplied canonical workbook meta
    render_relevance: indirect
    persistence_behavior: persisted in the hidden workbook metadata payload unchanged
    roundtrip_relevance: preserves composed transform mode, row/column key names, codec configuration, sparse behavior, and optional group projection
    producer:
      - domain.transformations.compact_multiaxis.expand_compact_multiaxis
      - domain.transformations.compact_multiaxis.contract_compact_multiaxis
      - callers supplying canonical workbook meta
    consumer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.workbook_projection.workbookir_to_frames
    merge_behavior: Transform entries are keyed by transform id and replace the prior entry of the same id.
    precedence_notes: Compact multiaxis metadata records generic composition only; dense axis reconstruction remains a future explicit contract and must not be inferred.

  - name: workbook_meta_blob
    layer: meta_rendering
    classification: carrier_artifact
    meaning: Hidden-sheet carrier entry that stores the persisted workbook metadata payload for the current XLSX path.
    scope: hidden workbook sheet
    origin: derived from canonical workbook meta during compose/pass execution
    render_relevance: indirect
    persistence_behavior: written to the hidden `_meta` sheet as the concrete persistence carrier
    roundtrip_relevance: current authoritative read-back carrier for canonical workbook metadata
    producer:
      - rendering.composer.layout_composer.compose_workbook
      - rendering.passes.apply_all
      - rendering.passes.core.MetaPass
    consumer:
      - rendering.flow.build_render_plan
      - io_backends.xlsx.openpyxl_parser._read_meta_sheet
      - rendering.workbook_projection.workbookir_to_frames
    precedence_notes: This is a carrier artifact for the current backend path, not a second canonical source.

  - name: options
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Merged per-sheet operational view of workbook and sheet directives used by rendering passes.
    scope: sheet
    origin: derived from canonical workbook defaults plus `sheets[<name>]` overrides
    render_relevance: direct
    persistence_behavior: not persisted as its own carrier; reconstructed from canonical metadata on read
    roundtrip_relevance: derived operational view, useful but not authoritative
    producer:
      - rendering.composer.layout_composer.compose_workbook
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    consumer:
      - rendering.passes.core.StylePass
      - rendering.passes.core.FilterPass
      - rendering.passes.core.FreezePass
    scope_inheritance: Starts from workbook-level defaults and is then overridden by sheet-local values.
    merge_behavior: Workbook option dict is copied, then updated with the sheet-local option dict.
    precedence_notes: Downstream passes should consume `options` instead of re-merging workbook meta themselves.

  - name: __style
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived sheet-local style directives prepared for `RenderPlan` style ops.
    scope: sheet
    origin: derived from `options` during IR passes
    render_relevance: direct
    persistence_behavior: transient IR-only metadata
    roundtrip_relevance: not authoritative; recomputed from canonical metadata when available
    producer:
      - rendering.passes.core.StylePass
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Derived write-path detail, not a user-facing canonical key.

  - name: __helper_cols
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived helper-column styling targets for columns whose headers match the configured helper prefix.
    scope: sheet
    origin: derived from `options` and table headers during IR passes
    render_relevance: direct
    persistence_behavior: transient IR-only metadata
    roundtrip_relevance: not authoritative
    producer:
      - rendering.passes.core.StylePass
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Derived write-path detail, not a user-facing canonical key.

  - name: __autofilter
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived autofilter area for later `SetAutoFilter` plan emission.
    scope: sheet
    origin: derived from `options` and table geometry during IR passes
    render_relevance: direct
    persistence_behavior: transient IR-only metadata
    roundtrip_relevance: not authoritative
    producer:
      - rendering.passes.core.FilterPass
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Derived write-path detail, not a user-facing canonical key.

  - name: __freeze
    layer: meta_rendering
    classification: derived_operational_view
    meaning: Derived freeze-pane target for later `SetFreeze` plan emission.
    scope: sheet
    origin: derived from `options` and table geometry during IR passes, or reconstructed from an existing workbook on read
    render_relevance: direct
    persistence_behavior: transient on write; reconstructed on read from the carrier workbook
    roundtrip_relevance: useful implementation hint, but canonical intent still belongs to `freeze_header`
    producer:
      - rendering.passes.core.FreezePass
      - io_backends.xlsx.openpyxl_parser._extract_freeze
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Carrier-side reconstruction should not be treated as a replacement for canonical policy.

  - name: __autofilter_ref
    layer: meta_rendering
    classification: read_path_hint
    meaning: Read-path reconstruction of the concrete autofilter reference found in an existing workbook.
    scope: sheet
    origin: parsed from workbook carrier state
    render_relevance: indirect
    persistence_behavior: read-path only helper; not emitted by the current write path
    roundtrip_relevance: diagnostic/read-back hint rather than canonical intent
    producer:
      - io_backends.xlsx.openpyxl_parser._parse_visible_sheet
    consumer:
      - tests and diagnostics
    precedence_notes: This is a carrier-side hint and should not outrank canonical `auto_filter`.

  - name: __legend_blocks
    layer: meta_rendering
    classification: read_path_hint
    meaning: Read-path hints identifying parsed visible table blocks that originated from canonical legend block metadata.
    scope: sheet
    origin: reconstructed from persisted `legend_blocks[*].resolved` metadata during parse
    render_relevance: indirect
    persistence_behavior: read-path only helper; not emitted by the current write path as a separate key
    roundtrip_relevance: prevents visible legend/codebook tables from being mistaken for primary data tables
    producer:
      - io_backends.xlsx.openpyxl_parser.parse_workbook
      - io_backends.ods.odf_parser.parse_workbook
    consumer:
      - tests and diagnostics
    precedence_notes: This is a carrier-side hint for IR reconstruction; canonical codebook content belongs to `legend_blocks`.

  - name: _hidden
    layer: meta_rendering
    classification: carrier_artifact
    meaning: Marker that a `SheetIR` belongs to the hidden workbook metadata carrier set.
    scope: hidden sheet
    origin: assigned when hidden sheets are created or parsed
    render_relevance: indirect
    persistence_behavior: used to decide hidden-sheet plan emission; excluded from the persisted key/value payload itself
    roundtrip_relevance: necessary to preserve hidden-sheet status in IR
    producer:
      - rendering.passes.core.MetaPass
      - io_backends.xlsx.openpyxl_parser._parse_hidden_sheet
    consumer:
      - rendering.flow.build_render_plan
    precedence_notes: Internal carrier control flag, not part of canonical workbook metadata.
